services:
  mongo-manager:
    build: .
    image: mongo-manager:latest
    container_name: monman
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      MONGO_MANAGER_WEB_HOST: 0.0.0.0
      MONGO_MANAGER_WEB_PORT: 8000
      MONGO_MANAGER_CONFIG_DIR: /app/config-data
    volumes:
      - ./config-data:/app/config-data
      - ./mongodb-backup:/app/mongodb-backup
